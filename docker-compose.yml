version: '3.8'
services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.2
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GRAPH_ARRAYS_PATH: /workspace/artifacts/graph_arrays.npz
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  ui:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: streamlit run app/frontend/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_URL: http://api:8000
    volumes:
      - ./:/workspace
    working_dir: /workspace
    ports:
      - "8501:8501"
    depends_on:
      - api
