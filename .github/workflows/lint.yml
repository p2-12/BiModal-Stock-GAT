name: lint
on: [push, pull_request]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install black ruff mypy
      - run: black --check src app tests
      - run: ruff check src app tests
      - run: mypy src app
